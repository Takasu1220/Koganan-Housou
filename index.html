<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>放送委員リクエストリスト</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            max-width: 1500px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #333;
        }
        /* パスワードフォーム */
        .auth-box {
            margin-bottom: 20px;
            padding: 15px;
            background: #eef2f3;
            border-radius: 6px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        input[type="password"], input[type="text"] {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            padding: 8px 16px;
            border: none;
            background-color: #00bfff;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background-color: #00b5df;
        }
        /* 編集エリア（初期状態は非表示） */
        .edit-area {
            display: none;
            margin-bottom: 20px;
            gap: 10px;
        }
        .edit-mode .edit-area {
            display: flex;
        }
        .edit-mode .auth-box {
            display: none; /* パスワード欄を隠す */
        }
        /* リストスタイル */
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            padding: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            transition: opacity 0.2s;
        }
        .item-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
        }
        .item-text {
            font-size: 16px;
            color: #333;
        }
        /* チェック済み項目のスタイル（テキストに打ち消し線、全体を少し薄く） */
        li.checked-item .item-text {
            text-decoration: line-through;
            color: #888;
        }
        li.checked-item {
            background-color: #fafafa;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        input[type="checkbox"]:disabled {
            cursor: not-allowed;
        }
        .delete-btn {
            display: none;
            background-color: #dc3545;
            padding: 4px 8px;
            font-size: 12px;
            margin-left: 10px;
        }
        .delete-btn:hover {
            background-color: #bd2130;
        }
        .edit-mode .delete-btn {
            display: inline-block; /* 編集モード時のみ削除ボタンを表示 */
        }
        .status-msg {
            font-size: 14px;
            color: #28a745;
            font-weight: bold;
            margin-bottom: 15px;
            display: none;
        }
        .edit-mode .status-msg {
            display: block;
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <h1>放送委員会 リクエスト曲共有リスト</h1>
    
    <!-- 状態表示 -->
    <div class="status-msg"> 編集モード有効（リストの追加・削除が可能です）</div>

    <!-- パスワード入力エリア -->
    <div class="auth-box">
        <input type="password" id="passwordInput" placeholder="管理用パスワードを入力">
        <button onclick="checkPassword()">リストを編集する</button>
    </div>

    <!-- アイテム追加エリア（編集モードのみ） -->
    <div class="edit-area">
        <input type="text" id="newItemInput" placeholder="新しいアイテムを追加" style="flex-grow: 1;">
        <button onclick="addItem()" style="background-color: #28a745;">追加</button>
    </div>

    <!-- リスト表示 -->
    <ul id="itemList"></ul>
</div>

<script>
    // PASSEDIT
    const CORRECT_PASSWORD = "London21";

    // 初期データ構造（テキストとチェック状態を保持）
    const defaultData = [
        { text: "リンゴの購入", checked: false },
        { text: "会議の資料作成", checked: true }, // 最初からチェック＆ロックされている例
        { text: "プログラミングの学習", checked: false }
    ];

    // データの読み込み
    let items = JSON.parse(localStorage.getItem('myListDataSecure')) || defaultData;

    // 画面にリストを描画する関数
    function renderList() {
        const listElement = document.getElementById('itemList');
        listElement.innerHTML = '';
        
        items.forEach((item, index) => {
            const li = document.createElement('li');
            if (item.checked) {
                li.classList.add('checked-item');
            }

            // チェックボックスのHTML（チェック済みなら disabled にして解除不可にする）
            const checkboxHtml = `
                <input type="checkbox" 
                       id="check-${index}" 
                       ${item.checked ? 'checked disabled' : ''} 
                       onchange="lockCheck(${index})">
            `;

            li.innerHTML = `
                <div class="item-left">
                    ${checkboxHtml}
                    <span class="item-text">${escapeHtml(item.text)}</span>
                </div>
                <button class="delete-btn" onclick="removeItem(${index})">削除</button>
            `;
            listElement.appendChild(li);
        });
    }

    // パスワードなしで誰でも実行できるチェックロック処理
    function lockCheck(index) {
        const checkbox = document.getElementById(`check-${index}`);
        
        // チェックが入った場合のみ処理を実行
        if (checkbox.checked) {
            items[index].checked = true;
            saveData();
            renderList(); // 再描画してチェックボックスを無効化（disabled）にする
        }
    }

    // パスワードチェック（追加・削除モードの切り替え）
    function checkPassword() {
        const input = document.getElementById('passwordInput').value;
        if (input === CORRECT_PASSWORD) {
            document.getElementById('mainContainer').classList.add('edit-mode');
        } else {
            alert('パスワードが違います。');
        }
    }

    // アイテムの追加（編集モードのみ）
    function addItem() {
        const inputElement = document.getElementById('newItemInput');
        const text = inputElement.value.trim();
        
        if (text !== '') {
            items.push({ text: text, checked: false });
            saveData();
            renderList();
            inputElement.value = '';
        }
    }

    // アイテムの削除（編集モードのみ）
    function removeItem(index) {
        if (confirm('このアイテムを削除しますか？')) {
            items.splice(index, 1);
            saveData();
            renderList();
        }
    }

    // ローカルストレージにデータを保存
    function saveData() {
        localStorage.setItem('myListDataSecure', JSON.stringify(items));
    }

    // XSS対策のサニタイズ関数
    function escapeHtml(str) {
        return str.replace(/[&<>"']/g, function(match) {
            const escape = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
            return escape[match];
        });
    }

    // 初回読み込み時の処理
    renderList();
</script>

</body>
</html>
